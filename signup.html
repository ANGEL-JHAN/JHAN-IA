<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Signup | ANGEL OFC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="auth-container" id="authContainer">
    <div class="auth-card" id="loginCard">
      <div class="logo-section">
        <div class="logo-icon">⚡</div>
        <h1>ANGEL OFC</h1>
        <p class="subtitle">Bienvenido de vuelta</p>
      </div>
      <form id="loginForm" class="auth-form">
        <div class="input-group">
          <label for="loginEmail">Email o Usuario</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="loginEmail" placeholder="tu@email.com" required>
          </div>
        </div>
        <div class="input-group">
          <label for="loginPassword">Contraseña</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="loginPassword" placeholder="••••••••" required>
            <button type="button" class="toggle-pass" onclick="togglePassword('loginPassword', this)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-options">
          <label class="remember-me"><input type="checkbox" id="rememberMe"><span class="checkmark"></span>Recordarme</label>
          <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>
        <button type="submit" class="btn-primary"><span>Iniciar Sesión</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
      </form>
      <div class="divider"><span>o continúa con</span></div>
      <div class="social-buttons">
        <button class="btn-social btn-google" onclick="loginWithGoogle()">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          <span>Google</span>
        </button>
        <button class="btn-social btn-facebook" onclick="loginWithFacebook()">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          <span>Facebook</span>
        </button>
        <button class="btn-social btn-gmail" onclick="loginWithGmail()">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#EA4335" d="M1.636 5.727v12.546h4.364V10.91L12 15.272l6-4.363v7.364h4.364V5.727L12 12.545z"/><path fill="#4285F4" d="M22.364 5.727L12 12.545 1.636 5.727 12 0z"/></svg>
          <span>Gmail</span>
        </button>
      </div>
      <p class="switch-text">¿No tienes cuenta? <a href="#" onclick="showSignup(event)">Regístrate</a></p>
      <p class="credits">By <span class="gradient-text">ANGEL OFC</span></p>
    </div>
    <div class="auth-card hidden" id="signupCard">
      <div class="logo-section">
        <div class="logo-icon">⚡</div>
        <h1>ANGEL OFC</h1>
        <p class="subtitle">Crea tu cuenta</p>
      </div>
      <form id="signupForm" class="auth-form">
        <div class="input-group">
          <label for="signupName">Nombre completo</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="signupName" placeholder="Tu nombre" required>
          </div>
        </div>
        <div class="input-group">
          <label for="signupUser">Usuario</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            <input type="text" id="signupUser" placeholder="@usuario" required>
          </div>
        </div>
        <div class="input-group">
          <label for="signupEmail">Email</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="signupEmail" placeholder="tu@email.com" required>
          </div>
        </div>
        <div class="input-group">
          <label for="signupPassword">Contraseña</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="signupPassword" placeholder="Mínimo 8 caracteres" required minlength="8">
            <button type="button" class="toggle-pass" onclick="togglePassword('signupPassword', this)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="password-strength" id="strengthBar"><div class="strength-fill" id="strengthFill"></div></div>
          <span class="strength-text" id="strengthText"></span>
        </div>
        <button type="submit" class="btn-primary"><span>Crear Cuenta</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
      </form>
      <div class="divider"><span>o regístrate con</span></div>
      <div class="social-buttons">
        <button class="btn-social btn-google" onclick="loginWithGoogle()"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg><span>Google</span></button>
        <button class="btn-social btn-facebook" onclick="loginWithFacebook()"><svg viewBox="0 0 24 24" width="20" height="20" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg><span>Facebook</span></button>
        <button class="btn-social btn-gmail" onclick="loginWithGmail()"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="#EA4335" d="M1.636 5.727v12.546h4.364V10.91L12 15.272l6-4.363v7.364h4.364V5.727L12 12.545z"/><path fill="#4285F4" d="M22.364 5.727L12 12.545 1.636 5.727 12 0z"/></svg><span>Gmail</span></button>
      </div>
      <p class="switch-text">¿Ya tienes cuenta? <a href="#" onclick="showLogin(event)">Inicia Sesión</a></p>
      <p class="credits">By <span class="gradient-text">ANGEL OFC</span></p>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <script src="script.js"></script>
</body>
</html>
